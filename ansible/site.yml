---
- name: Base server configuration
  hosts: "{{ target_hosts | default('production') }}"
  become: true
  roles:
    - common
    - security
    - role: host_tuning
      tags: [host-tuning]
    - role: k3s
      tags: [k3s]
    - role: monitoring
      tags: [monitoring]
    - role: logging
      tags: [logging]
    - nginx
    - xray
    - sandstorm
    - role: backup
      tags: [backup]
      when: backup_s3_bucket | length > 0
