---
# The old docker-compose stack in /opt/logging is deliberately NOT managed
# (and NOT removed) here anymore: it keeps running as the fallback until the
# k3s stack is confirmed working. Tear it down manually afterwards
# (docker compose down in /opt/logging).
#
# The namespace and the python client are created by the monitoring role,
# which always runs before this one in site.yml.

- name: Check kubernetes python client presence
  ansible.builtin.stat:
    path: /usr/lib/python3/dist-packages/kubernetes
  register: logging_k8s_py
  # Read-only query: run it even in --check so the guard below reflects the
  # real host state.
  check_mode: false

- name: Apply logging manifests to k3s
  # Guard for --check on a host that never ran the apply: without the python
  # client the k8s module errors instead of reporting drift.
  when: not ansible_check_mode or logging_k8s_py.stat.exists
  module_defaults:
    kubernetes.core.k8s:
      kubeconfig: /etc/rancher/k3s/k3s.yaml
      state: present
  block:
    - name: Deploy Loki
      kubernetes.core.k8s:
        definition: "{{ lookup('template', 'k8s/loki.yaml.j2') }}"

    - name: Deploy Alloy
      kubernetes.core.k8s:
        definition: "{{ lookup('template', 'k8s/alloy.yaml.j2') }}"
