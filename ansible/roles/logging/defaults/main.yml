---
# Pinned images (avoid :latest in IaC - reproducibility)
loki_image: grafana/loki:3.4.2
alloy_image: grafana/alloy:v1.6.1

# Retention: how long Loki keeps logs before the compactor deletes them.
# Insurgency.log grows ~5 MB/min when busy -> ~7 GB/day. With ~38 GB free,
# 7 days is a safe ceiling. Tune down if disk gets tight.
loki_retention_period: 168h          # 7 days

# The RCON manager's join/leave events carry the player id and are the only
# durable record of who connected. ~10 lines an hour, a few MB a year, so they
# outlive the game log by a wide margin. Applied via retention_stream.
loki_manager_retention_period: 8760h  # 1 year

# Whether to tail the Insurgency game log. Set false on any host that does
# not run the game server, so Alloy does not mount a missing log directory.
logging_collect_iss: true

# Path to the live game log on the host. Alloy mounts its parent DIRECTORY
# read-only (a file mount would go stale when the game recreates the log).
iss_log_path: /home/steam/.local/share/Steam/steamapps/common/sandstorm_server/Insurgency/Saved/Logs/Insurgency.log

# local-path ignores requested sizes (no quotas) - these are documentation.
loki_pvc_size: 10Gi
alloy_pvc_size: 1Gi
