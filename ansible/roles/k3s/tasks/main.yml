---
- name: Ensure k3s config directory exists
  ansible.builtin.file:
    path: /etc/rancher/k3s
    state: directory
    mode: "0755"

- name: Deploy k3s config
  ansible.builtin.template:
    src: config.yaml.j2
    dest: /etc/rancher/k3s/config.yaml
    owner: root
    group: root
    mode: "0644"
  notify: Restart k3s

- name: Check installed k3s version
  ansible.builtin.command: /usr/local/bin/k3s --version
  register: k3s_current
  changed_when: false
  failed_when: false
  # Read-only query: run it even in --check so the install gate and the
  # check-mode guards below evaluate against the real host state.
  check_mode: false

- name: Install k3s {{ k3s_version }}
  tags: install
  when: k3s_version not in (k3s_current.stdout | default(''))
  block:
    - name: Download k3s install script
      ansible.builtin.get_url:
        url: https://get.k3s.io
        dest: /tmp/k3s-install.sh
        mode: "0755"

    - name: Run k3s installer
      ansible.builtin.command: /tmp/k3s-install.sh
      environment:
        INSTALL_K3S_VERSION: "{{ k3s_version }}"
      changed_when: true

- name: Ensure k3s service is enabled and running
  ansible.builtin.systemd:
    name: k3s
    state: started
    enabled: true
  # Guard for --check on a host without k3s: the unit does not exist yet
  # (install tasks are gated behind --skip-tags install in CD), so checking
  # its state would error instead of reporting drift.
  when: not ansible_check_mode or k3s_current.rc == 0

- name: Ensure .kube directory for {{ k3s_kubeconfig_user }}
  ansible.builtin.file:
    path: "/home/{{ k3s_kubeconfig_user }}/.kube"
    state: directory
    owner: "{{ k3s_kubeconfig_user }}"
    group: "{{ k3s_kubeconfig_user }}"
    mode: "0700"

- name: Copy kubeconfig for {{ k3s_kubeconfig_user }}
  ansible.builtin.copy:
    src: /etc/rancher/k3s/k3s.yaml
    dest: "/home/{{ k3s_kubeconfig_user }}/.kube/config"
    remote_src: true
    owner: "{{ k3s_kubeconfig_user }}"
    group: "{{ k3s_kubeconfig_user }}"
    mode: "0600"
  when: not ansible_check_mode or k3s_current.rc == 0

# k3s ships kubectl as a symlink to the k3s binary, and that wrapper defaults
# to root-only /etc/rancher/k3s/k3s.yaml - it ignores ~/.kube/config unless
# KUBECONFIG points at it.
- name: Point kubectl at the copied kubeconfig
  ansible.builtin.lineinfile:
    path: "/home/{{ k3s_kubeconfig_user }}/.bashrc"
    regexp: '^export KUBECONFIG='
    line: export KUBECONFIG="$HOME/.kube/config"

- name: Allow k3s pod and service networks through ufw
  community.general.ufw:
    rule: allow
    from_ip: "{{ item }}"
    comment: k3s internal network
  loop:
    - "{{ k3s_pod_cidr }}"
    - "{{ k3s_service_cidr }}"
