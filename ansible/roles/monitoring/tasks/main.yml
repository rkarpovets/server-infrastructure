---
# --- Host level: textfile-collector inputs -----------------------------------
# Written on the HOST (by servermanager.py and the systemd timer below) and
# read by node_exporter in k3s through a hostPath mount.

- name: Create node_exporter textfile directory
  ansible.builtin.file:
    path: "{{ monitoring_textfile_dir }}"
    state: directory
    mode: "0755"

- name: Deploy systemd unit-state exporter script
  ansible.builtin.template:
    src: node_exporter_units.sh.j2
    dest: /usr/local/bin/node_exporter_units.sh
    mode: "0755"

- name: Deploy unit-state exporter service and timer
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "/etc/systemd/system/{{ item }}"
    mode: "0644"
  loop:
    - node-exporter-units.service
    - node-exporter-units.timer

- name: Write unit states once
  ansible.builtin.command: /usr/local/bin/node_exporter_units.sh
  changed_when: false

- name: Enable and start unit-state exporter timer
  ansible.builtin.systemd:
    name: node-exporter-units.timer
    enabled: true
    state: started
    daemon_reload: true

# --- k3s: monitoring stack ----------------------------------------------------
# The old docker-compose stack in /opt/monitoring is deliberately NOT managed
# (and NOT removed) here anymore: it keeps running as the fallback until the
# k3s stack is confirmed working and nginx is switched over. Tear it down
# manually afterwards (docker compose down in /opt/monitoring).

- name: Install kubernetes python client (needed by kubernetes.core.k8s)
  ansible.builtin.apt:
    name: python3-kubernetes
    state: present

- name: Check kubernetes python client presence
  ansible.builtin.stat:
    path: /usr/lib/python3/dist-packages/kubernetes
  register: monitoring_k8s_py
  # Read-only query: run it even in --check so the guard below reflects the
  # real host state (the apt task above does not install in check mode).
  check_mode: false

- name: Apply monitoring manifests to k3s
  # Guard for --check on a host that never ran the apply: without the python
  # client the k8s module errors instead of reporting drift.
  when: not ansible_check_mode or monitoring_k8s_py.stat.exists
  module_defaults:
    kubernetes.core.k8s:
      kubeconfig: /etc/rancher/k3s/k3s.yaml
      state: present
  block:
    - name: Create monitoring namespace
      kubernetes.core.k8s:
        definition: "{{ lookup('template', 'k8s/namespace.yaml.j2') }}"

    - name: Deploy node-exporter
      kubernetes.core.k8s:
        definition: "{{ lookup('template', 'k8s/node-exporter.yaml.j2') }}"

    - name: Deploy Prometheus
      kubernetes.core.k8s:
        definition: "{{ lookup('template', 'k8s/prometheus.yaml.j2') }}"

    - name: Deploy Grafana
      # The rendered manifests embed the admin password and the Telegram bot
      # token - never let the module print them in diffs or errors.
      no_log: true
      kubernetes.core.k8s:
        definition: "{{ lookup('template', 'k8s/grafana.yaml.j2') }}"
