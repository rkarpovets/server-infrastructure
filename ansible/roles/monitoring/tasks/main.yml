---
# Use the docker CLI (not community.docker.docker_network) - the Python SDK
# module breaks on modern requests/urllib3 with "Not supported URL scheme
# http+docker". docker_compose_v2 already shells out to the CLI, so we match it.
- name: Ensure shared docker network exists (Grafana <-> Loki)
  ansible.builtin.command: docker network create monitoring_net
  register: monitoring_net_create
  changed_when: monitoring_net_create.rc == 0
  failed_when:
    - monitoring_net_create.rc != 0
    - "'already exists' not in monitoring_net_create.stderr"

- name: Create monitoring directory
  ansible.builtin.file:
    path: "{{ monitoring_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Create Grafana provisioning directories
  ansible.builtin.file:
    path: "{{ monitoring_dir }}/grafana/provisioning/{{ item }}"
    state: directory
    mode: "0750"
  loop:
    - datasources
    - alerting
    - dashboards

- name: Deploy docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ monitoring_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0640"
  notify: Restart monitoring stack

- name: Deploy prometheus.yml
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: "{{ monitoring_dir }}/prometheus.yml"
    mode: "0644"
  notify: Restart monitoring stack

- name: Deploy Grafana datasource provisioning
  ansible.builtin.template:
    src: grafana-datasource.yml.j2
    dest: "{{ monitoring_dir }}/grafana/provisioning/datasources/prometheus.yml"
    mode: "0644"
  notify: Restart monitoring stack

- name: Deploy Grafana contact points (Telegram)
  ansible.builtin.template:
    src: grafana-contactpoints.yml.j2
    dest: "{{ monitoring_dir }}/grafana/provisioning/alerting/contactpoints.yml"
    mode: "0640"
  notify: Restart monitoring stack

- name: Deploy Grafana notification policy
  ansible.builtin.copy:
    src: grafana-policies.yml
    dest: "{{ monitoring_dir }}/grafana/provisioning/alerting/policies.yml"
    mode: "0644"
  notify: Restart monitoring stack

- name: Deploy Grafana alert rules
  ansible.builtin.template:
    src: grafana-rules.yml.j2
    dest: "{{ monitoring_dir }}/grafana/provisioning/alerting/rules.yml"
    mode: "0644"
  notify: Restart monitoring stack

- name: Create Grafana dashboards content directory
  ansible.builtin.file:
    path: "{{ monitoring_dir }}/grafana/dashboards"
    state: directory
    mode: "0755"

- name: Deploy Grafana dashboards provider config
  ansible.builtin.copy:
    src: grafana-dashboards-provider.yml
    dest: "{{ monitoring_dir }}/grafana/provisioning/dashboards/provider.yml"
    mode: "0644"
  notify: Restart monitoring stack

- name: Deploy Node Exporter Full dashboard
  ansible.builtin.copy:
    src: dashboards/node-exporter-full.json
    dest: "{{ monitoring_dir }}/grafana/dashboards/node-exporter-full.json"
    mode: "0644"
  notify: Restart monitoring stack

- name: Deploy Insurgency Sandstorm dashboard (players online + per-core CPU)
  ansible.builtin.copy:
    src: dashboards/iss.json
    dest: "{{ monitoring_dir }}/grafana/dashboards/iss.json"
    mode: "0644"
  notify: Restart monitoring stack

- name: Create node_exporter textfile directory
  ansible.builtin.file:
    path: "{{ monitoring_textfile_dir }}"
    state: directory
    mode: "0755"

- name: Deploy systemd unit-state exporter script
  ansible.builtin.template:
    src: node_exporter_units.sh.j2
    dest: /usr/local/bin/node_exporter_units.sh
    mode: "0755"

- name: Deploy unit-state exporter service and timer
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "/etc/systemd/system/{{ item }}"
    mode: "0644"
  loop:
    - node-exporter-units.service
    - node-exporter-units.timer

- name: Write unit states once
  ansible.builtin.command: /usr/local/bin/node_exporter_units.sh
  changed_when: false

- name: Enable and start unit-state exporter timer
  ansible.builtin.systemd:
    name: node-exporter-units.timer
    enabled: true
    state: started
    daemon_reload: true

- name: Start monitoring stack
  community.docker.docker_compose_v2:
    project_src: "{{ monitoring_dir }}"
    state: present
