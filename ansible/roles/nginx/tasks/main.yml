---
- name: Install nginx
  ansible.builtin.apt:
    name: nginx
    state: present
    update_cache: true

- name: Restore Let's Encrypt certificates from backup
  ansible.builtin.unarchive:
    src: "{{ nginx_letsencrypt_restore_path }}"
    dest: /etc
    creates: "{{ nginx_tls_cert }}"
  when:
    - nginx_enable_tls | bool
    - nginx_letsencrypt_restore_path | length > 0

- name: Remove nginx worker CPU pinning
  ansible.builtin.lineinfile:
    path: /etc/nginx/nginx.conf
    regexp: '^\s*worker_cpu_affinity'
    state: absent
  # worker_cpu_affinity pins one worker per core, and an explicit affinity
  # overrides isolcpus - a worker lands on the isolated game core. Without
  # the pin the scheduler keeps all workers on the general-purpose cores.
  notify:
    - Validate nginx config
    - Reload nginx

- name: Remove default site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Reload nginx

- name: Deploy websocket upgrade map
  ansible.builtin.copy:
    dest: /etc/nginx/conf.d/websocket_upgrade.conf
    content: |
      map $http_upgrade $connection_upgrade {
          default upgrade;
          ''      close;
      }
    mode: "0644"
  notify: Reload nginx

- name: Deploy Grafana reverse-proxy site
  ansible.builtin.template:
    src: grafana.conf.j2
    dest: /etc/nginx/sites-available/grafana.conf
    mode: "0644"
  notify:
    - Validate nginx config
    - Reload nginx

- name: Enable Grafana site
  ansible.builtin.file:
    src: /etc/nginx/sites-available/grafana.conf
    dest: /etc/nginx/sites-enabled/grafana.conf
    state: link
  # In --check mode the deploy task above does not actually create
  # grafana.conf, so the symlink source is absent; skip then (a real
  # run creates the file first).
  when: not ansible_check_mode
  notify:
    - Validate nginx config
    - Reload nginx

- name: Allow HTTP through ufw
  no_log: true
  community.general.ufw:
    rule: allow
    port: "80"
    proto: tcp
    comment: "HTTP nginx"

- name: Allow HTTPS through ufw
  no_log: true
  community.general.ufw:
    rule: allow
    port: "{{ nginx_https_port }}"
    proto: tcp
    comment: "HTTPS nginx"
  when: nginx_enable_tls | bool

- name: Ensure nginx is enabled and running
  ansible.builtin.service:
    name: nginx
    state: started
    enabled: true
