---
# Ansible collection dependencies. Pinned for reproducibility - the same
# versions install on a clean CI runner as on the control node.
#   ansible-galaxy collection install -r requirements.yml
collections:
  - name: community.general    # ufw, and other general-purpose modules
    version: "8.3.0"
  - name: community.docker     # docker_compose_v2 for the monitoring/logging stacks
    version: "3.7.0"
