[defaults]
inventory = inventory/hosts.yml
roles_path = roles
host_key_checking = False
retry_files_enabled = False
interpreter_python = auto_silent
stdout_callback = yaml
bin_ansible_callbacks = True
vault_password_file = ~/.ansible_vault_pass
# Some tasks become an unprivileged user (become_user: steam). When the
# target has no ACL support - e.g. the acl package is not yet installed,
# as in a --check run before the apt task runs - fall back to briefly
# world-readable temp files instead of failing. Safe on a single-admin host.
allow_world_readable_tmpfiles = True

[privilege_escalation]
become = True
become_method = sudo
