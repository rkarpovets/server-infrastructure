---
# Overrides for the production VPS. The concrete, non-standard port numbers
# live encrypted in the vault (group_vars/all/vault.yml) so the public repo
# never reveals the live firewall map. Applied to hosts in the `production` group.

# SSH and firewall
ssh_port: "{{ vault_ssh_port }}"
ufw_enable: true
# Password auth kept as a deliberate fallback (strong account password set
# out-of-band); the non-standard SSH port + fail2ban cover brute-force risk.
ssh_password_authentication: "yes"
# nginx jails also cover the Grafana HTTPS port served by nginx.
fail2ban_nginx_ports: "http,https,{{ nginx_https_port }}"

# nginx: Grafana is served over HTTPS on a dedicated port (the standard 443 is
# held by xray). The concrete port comes from the vault.
nginx_enable_tls: true
nginx_server_name: "{{ vault_nginx_server_name }}"
nginx_https_port: "{{ vault_nginx_https_port }}"
grafana_root_url: "https://{{ nginx_server_name }}:{{ nginx_https_port }}/"

# xray / 3x-ui (native). Panel port and live VPN inbound ports come from the vault.
xray_panel_port: "{{ vault_xray_panel_port }}"
xray_inbound_ports: "{{ vault_xray_inbound_ports }}"

# Off-site backup (restic -> Cloudflare R2, S3-compatible). Endpoint and bucket
# live in the vault so the public repo never reveals the live storage target.
# Setting the bucket enables the backup role; lab hosts leave it empty and skip
# the role entirely.
backup_s3_endpoint: "{{ vault_backup_s3_endpoint }}"
backup_s3_bucket: "{{ vault_backup_s3_bucket }}"

# Service-down alerts cover these systemd units on prod. Everything else
# runs in k3s and is watched by k8s liveness/restart policy.
monitoring_alert_units:
  - x-ui
